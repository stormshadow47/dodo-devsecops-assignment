name: Build and Secure Container

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ledger-api

jobs:
  build-security-scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit


      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          fetch-depth: 0

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: fs
          scan-ref: ./Task-1-Deploy-and-Harden-Workload
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./Task-1-Deploy-and-Harden-Workload/app
          file: ./Task-1-Deploy-and-Harden-Workload/app/Dockerfile
          load: true
          push: false
          tags: |
            ledger-api:ci
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ledger-api:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image to GHCR
        run: |
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Build Summary
        run: |
          echo "Docker image built, scanned and published successfully."