name: build

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-ledger-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ledger-api
        run: |
          VERSION="${GITHUB_SHA::7}"
          IMAGE=ghcr.io/${{ github.repository_owner }}/ledger-api:${VERSION}
          docker build -t "$IMAGE" ./app
          docker push "$IMAGE"

  build-reporting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push reporting
        run: |
          VERSION="${GITHUB_SHA::7}"
          IMAGE=ghcr.io/${{ github.repository_owner }}/reporting:${VERSION}
          docker build -t "$IMAGE" ./app/reporting
          docker push "$IMAGE"
