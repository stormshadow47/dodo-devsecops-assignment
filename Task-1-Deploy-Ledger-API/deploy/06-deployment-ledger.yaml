apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-api
  namespace: payments
  labels:
    app: ledger-api
spec:
  replicas: 5
  selector:
    matchLabels:
      app: ledger-api
  template:
    metadata:
      labels:
        app: ledger-api
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: "runtime/default"
    spec:
      serviceAccountName: ledger-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ledger-api
          image: ledger-api:starter
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          env:
            - name: VAULT_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: ledger-api-secrets
                  key: VAULT_AUTH_KEY
            - name: VAULT_VERIFY_URL
              valueFrom:
                configMapKeyRef:
                  name: ledger-api-config
                  key: VAULT_VERIFY_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ledger-api-config
                  key: LOG_LEVEL
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: ledger-api-config
                  key: PORT
            - name: DATABASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: ledger-api-config
                  key: DATABASE_PATH
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
